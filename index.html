<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Bounce Quest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 600px;
            max-height: 800px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Main Menu */
        #mainMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            gap: 30px;
        }

        #mainMenu h1 {
            font-size: 64px;
            color: white;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        #mainMenu p {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            max-width: 400px;
        }

        #startButton {
            padding: 20px 50px;
            font-size: 24px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #333;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        #startButton:active {
            transform: scale(0.95);
        }

        #startButton:hover {
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        /* UI */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #764ba2;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .level-box {
            background: rgba(255, 215, 0, 0.95);
            padding: 12px 20px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        /* Game Over */
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            display: none;
            z-index: 100;
            min-width: 300px;
        }

        #gameOver h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #FFD700;
        }

        #gameOver p {
            font-size: 22px;
            margin: 10px 0;
            color: #fff;
        }

        #gameOver button {
            margin-top: 20px;
            margin-right: 10px;
            padding: 12px 30px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #gameOver button:active {
            transform: scale(0.95);
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.85);
            padding: 12px 20px;
            border-radius: 15px;
            font-size: 13px;
            color: #333;
            text-align: center;
            z-index: 10;
        }

        @media (max-width: 600px) {
            #gameContainer {
                border-radius: 0;
                max-width: 100%;
                max-height: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- Main Menu -->
        <div id="mainMenu">
            <h1>🎮 Bounce Quest</h1>
            <p>Jump through the obstacles and reach new levels!</p>
            <p>Each level gets harder and faster 🚀</p>
            <button id="startButton">START GAME</button>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div class="score-box">Score: <span id="scoreValue">0</span></div>
            <div class="level-box">Level <span id="levelValue">1</span></div>
            <div class="score-box">Best: <span id="bestValue">0</span></div>
        </div>

        <div id="gameOver">
            <h1>LEVEL COMPLETE! 🎉</h1>
            <p>Level: <span id="finalLevel">1</span></p>
            <p>Score: <span id="finalScore">0</span></p>
            <button onclick="nextLevel()">Next Level →</button>
            <button onclick="goToMenu()">Main Menu</button>
        </div>

        <div class="instruction">
            👆 Tap or Click to Jump | Avoid Red Obstacles
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
